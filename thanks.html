<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>お問い合わせ完了 | 瑞鳳堂株式会社</title>
  <meta name="description" content="お問い合わせありがとうございました。瑞鳳堂株式会社より順次ご返信いたします。">
  <style>
    :root{
      --brand:#0066cc;
      --fg:#111;
      --muted:#666;
      --bg:#fffafc;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--fg);
      background:var(--bg);
    }
    .wrap{
      max-width:880px;
      margin:0 auto;
      padding:32px 16px;
    }
    .card{
      background:#fff;
      border:1px solid #eee;
      border-radius:16px;
      padding:32px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
      text-align:center;
      position:relative;
      z-index:1;
    }
    h1{
      font-size:28px;
      margin:0 0 12px;
    }
    p{
      line-height:1.9;
      color:var(--muted);
      margin:8px 0;
    }
    a.btn{
      display:inline-block;
      margin-top:18px;
      background:var(--brand);
      color:#fff;
      text-decoration:none;
      padding:12px 18px;
      border-radius:10px;
      font-weight:600;
    }
    .sakura{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }
    .petal{
      position:absolute;
      top:-10vh;
      width:14px;
      height:14px;
      background:
        radial-gradient(closest-side,#ffb7c5 92%,#0000),
        radial-gradient(closest-side,#ffd6e0 92%,#0000);
      border-radius:100% 10% 90% 10% / 10% 90% 10% 90%;
      opacity:.85;
      animation:fall 9s linear infinite,sway 3.2s ease-in-out infinite alternate;
    }
    @keyframes fall{
      to{transform:translateY(120vh) rotate(720deg)}
    }
    @keyframes sway{
      from{margin-left:-20px}
      to{margin-left:20px}
    }
    .kawaii{
      width:90px;
      height:90px;
      border-radius:20px;
      background:#fff;
      border:3px solid #222;
      display:grid;
      place-items:center;
      margin:0 auto 12px;
    }
    .face{
      position:relative;
      width:56px;
      height:36px;
      border-radius:18px;
      background:#ffe8ef;
      border:2px solid #222;
    }
    .eye,.eye:after{
      position:absolute;
      top:8px;
      width:8px;
      height:8px;
      background:#222;
      border-radius:50%;
    }
    .eye{left:10px}
    .eye:after{
      content:"";
      right:-28px;
    }
    .smile{
      position:absolute;
      left:50%;
      top:18px;
      transform:translateX(-50%);
      width:22px;
      height:10px;
      border:3px solid #222;
      border-top:0;
      border-radius:0 0 14px 14px;
    }
  </style>
</head>
<body>
  <div class="sakura" id="sakura"></div>

  <div class="wrap">
    <div class="card">
      <div class="kawaii">
        <div class="face">
          <span class="eye"></span>
          <span class="smile"></span>
        </div>
      </div>

      <h1>お問い合わせありがとうございました！</h1>
      <p>メッセージは正常に送信されました。</p>
      <p>通常 1～2 営業日以内にご返信いたします。</p>
      <p>下のボタンからトップページへお戻りいただけます。</p>

      <p>
        <a class="btn" href="https://zuihoudou.com/">トップページへ戻る</a>
      </p>
    </div>
  </div>

  <script>
    const box = document.getElementById('sakura');
    for(let i=0;i<35;i++){
      const p=document.createElement('div');
      p.className='petal';
      p.style.left=Math.random()*100+'vw';
      p.style.animationDelay=(Math.random()*-9)+'s';
      p.style.animationDuration=(8+Math.random()*6)+'s';
      p.style.opacity=(0.6+Math.random()*0.4);
      box.appendChild(p);
    }
  </script>
</body>
</html>
